# Cloud Build: build the Vertex training image from gcp/Dockerfile (repo root context).
# torch+CUDA install is heavy -> bigger machine + 30-min timeout (default 10 min is too short).
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "gcp/Dockerfile", "-t", "${_IMG}", "."]
images: ["${_IMG}"]
timeout: 1800s
options:
  machineType: E2_HIGHCPU_8
  diskSizeGb: 100
