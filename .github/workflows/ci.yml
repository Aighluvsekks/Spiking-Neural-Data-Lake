name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  stdlib-self-checks:
    name: stdlib self-checks (zero deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run every pure-stdlib script's assert-based self-check
        run: python run_selfchecks.py   # canonical module list lives in run_selfchecks.py
